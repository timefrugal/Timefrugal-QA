# Timefrugal-QA Reusable Workflow
# ─────────────────────────────────────────────────────────────────────────────
# This is the CENTRAL workflow stored in github.com/Timefrugal/Timefrugal-QA.
# Other repos call it with:
#
#   jobs:
#     qa:
#       uses: Timefrugal/Timefrugal-QA/.github/workflows/qa-reusable.yml@main
#       secrets: inherit
#
# The workflow uses GitHub Models (free AI) via the built-in GITHUB_TOKEN —
# no external API keys or paid services required.
# ─────────────────────────────────────────────────────────────────────────────

name: Timefrugal-QA (Reusable)

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to use"
        required: false
        type: string
        default: "3.11"
      base-ref:
        description: "Base branch to diff against"
        required: false
        type: string
        default: "main"
      ai-model:
        description: "GitHub Models AI model (default: gpt-4o-mini — free)"
        required: false
        type: string
        default: "gpt-4o-mini"
      generate-tests:
        description: "Whether to generate AI test cases (true/false)"
        required: false
        type: boolean
        default: true
jobs:
  qa-review:
    name: AI QA Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write       # to post PR comments
      statuses: write            # to set commit status checks

    steps:
      # ── Checkout ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0         # Full history needed for git diff

      # ── Fetch base branch for diffing ────────────────────────────────
      - name: Fetch base branch
        run: git fetch origin ${{ inputs.base-ref }} --depth=50

      # ── Python setup ────────────────────────────────────────────────
      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      # ── Cache pip dependencies ───────────────────────────────────────
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-timefrugal-qa-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-timefrugal-qa-

      # ── Install Timefrugal-QA agent ──────────────────────────────────
      - name: Install Timefrugal-QA agent
        run: |
          pip install --upgrade pip
          # Install the QA agent from the central repo
          pip install git+https://github.com/Timefrugal/Timefrugal-QA.git@main

      # ── Install open-source analysis tools ──────────────────────────
      - name: Install analysis tools
        run: |
          pip install bandit semgrep pylint mypy radon pip-audit

      # ── Install target repo dependencies (if present) ────────────────
      - name: Install project dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f pyproject.toml ]; then pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || true; fi
        continue-on-error: true

      # ── Run Timefrugal-QA ────────────────────────────────────────────
      - name: Run Timefrugal-QA
        id: qa
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          QA_AI_MODEL: ${{ inputs.ai-model }}
          QA_GENERATE_TESTS: ${{ inputs.generate-tests }}
        run: |
          EXTRA_FLAGS=""
          if [ "$QA_GENERATE_TESTS" = "false" ]; then EXTRA_FLAGS="--no-tests"; fi
          python -m qa_agent \
            --ci \
            --base origin/${{ inputs.base-ref }} \
            --pr ${{ github.event.pull_request.number }} \
            $EXTRA_FLAGS
        # Exit code 1 = blocking issues found → fail the workflow
        # Exit code 0 = all clear

      # ── Upload QA report as artifact ────────────────────────────────
      - name: Upload QA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-report
          path: qa_report.md
          if-no-files-found: ignore
          retention-days: 30
