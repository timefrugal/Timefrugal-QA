name: Auto-setup QA on new repos

on:
  schedule:
    - cron: '0 9 * * *'   # Daily at 09:00 UTC
  workflow_dispatch:       # Manual trigger from Actions UI

jobs:
  setup-repos:
    name: Add QA workflow to repos missing it
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Timefrugal-QA
        uses: actions/checkout@v4

      - name: Add QA workflow to all repos
        env:
          SETUP_PAT: ${{ secrets.GH_PAT }}
        run: |
          export GH_TOKEN="$SETUP_PAT"
          bash scripts/setup_all_repos.sh
