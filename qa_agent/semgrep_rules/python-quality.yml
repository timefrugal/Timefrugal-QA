rules:
  - id: bare-except
    pattern: |
      try:
        ...
      except:
        ...
    message: >
      Bare except catches everything including KeyboardInterrupt and SystemExit.
      Use except Exception to avoid swallowing signals and fatal errors.
    severity: WARNING
    languages: [python]
    metadata:
      category: quality

  - id: mutable-default-arg
    pattern-either:
      - pattern: def $FUNC(..., $ARG=[], ...): ...
      - pattern: def $FUNC(..., $ARG={}, ...): ...
    message: >
      Mutable default argument '$ARG' is shared across all calls — mutations persist between
      invocations. Use None as the default and initialise inside the function body.
    severity: WARNING
    languages: [python]
    metadata:
      category: quality
